<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
*{box-sizing:border-box}

body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
background:#f4f6f8;
}

.wrapper{
width:96%;
max-width:700px;
margin:0 auto;
padding:14px;
}

.topbar{
text-align:center;
margin-bottom:10px;
}

.logo{
max-width:150px;
}

h2{
text-align:center;
margin:10px 0 20px;
}

.box{
background:#fff;
border-radius:16px;
padding:18px;
margin-bottom:16px;
box-shadow:0 4px 14px rgba(0,0,0,0.05);
}

label{
font-size:14px;
display:block;
margin-bottom:6px;
}

input{
width:100%;
padding:16px;
font-size:18px;
border-radius:12px;
border:1px solid #ccc;
}

.btn{
width:100%;
padding:14px;
font-size:16px;
border-radius:12px;
border:none;
background:#1976d2;
color:#fff;
margin-top:12px;
font-weight:600;
}

.btn:active{
transform:scale(0.98);
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
margin-top:10px;
}

@media(max-width:480px){
.grid{
grid-template-columns:1fr;
}
}

</style>
</head>

<body>

<div class="wrapper">

<div class="topbar">
<img src="logo.png" class="logo">
</div>

<h2>Friska Daily Kitchen Panel</h2>

<div class="box">

<label>Select Date</label>
<input type="date" id="date">

</div>

<div class="box">

<div class="grid">

<button class="btn" onclick="run('full')">
Full List
</button>

<button class="btn" onclick="run('client')">
Client List
</button>

<button class="btn" onclick="run('meals')">
Meal List
</button>

<button class="btn" onclick="run('delivery')">
Delivery List
</button>

<button class="btn" onclick="run('tags')">
Tags
</button>

</div>

</div>

</div>

<script>

const API="http://127.0.0.1:8000"

function run(type){

const date=document.getElementById("date").value

if(!date){
alert("Select date")
return
}

window.open(`${API}/${type}?date=${date}`,"_blank")

}

</script>

</body>
</html>
